
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<div class="container">
    <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h2 class="text text-center">Update Event</h2>
    <hr/>

    <div class="form-group">
        <label for="event_name">Event Name</label>
        <input type="text" class="form-control" id="event_name" name="event_name" value="{{ event.event_name }}" required>
    </div>
    <div class="form-group">
        <label for="event_date">Event Date</label>
        <input type="date" class="form-control" id="event_date" name="event_date" value="{{ event.event_date }}" required>
    </div>
    <div class="form-group">
        <label for="event_time">Event Time</label>
        <input type="time" class="form-control" id="event_time" name="event_time" value="{{ event.event_time }}" required>
    </div>
    <div class="form-group">
        <label for="event_location">Event Location</label>
        <input type="text" class="form-control" id="event_location" name="event_location" value="{{ event.event_location }}" required>
    </div>
    <div class="form-group">
        <label for="event_category">Event Category</label>
        <select class="form-control" id="event_category" name="event_category" required>
            <option value="music" {% if event.event_category == "music" %}selected{% endif %}>Music</option>
            <option value="sports" {% if event.event_category == "sports" %}selected{% endif %}>Sports</option>
            <option value="arts" {% if event.event_category == "arts" %}selected{% endif %}>Arts</option>
            <option value="education" {% if event.event_category == "education" %}selected{% endif %}>Education</option>
            <option value="technology" {% if event.event_category == "technology" %}selected{% endif %}>Technology</option>
            <option value="entertainment" {% if event.event_category == "entertainment" %}selected{% endif %}>Entertainment</option>      
            <option value="food" {% if event.event_category == "food" %}selected{% endif %}>Food</option>
            <option value="business" {% if event.event_category == "business" %}selected{% endif %}>Business</option>
            <option value="charity" {% if event.event_category == "charity" %}selected{% endif %}>Charity</option>
            <option value="social" {% if event.event_category == "social" %}selected{% endif %}>Social</option>
        </select>
    </div>
    <div class="form-group">
        <label for="event_description">Event Description</label>
        <textarea class="form-control" id="event_description" name="event_description" rows="3" required>{{ event.event_description }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update Event</button>
</form>
</div>
{% endblock %}
