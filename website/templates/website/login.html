{% extends "website/home.html" %}
{% load static %}
{% block content %}


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'website/styles.css' %}">

<div class="container mt-5" >
    <div class="row justify-content-center" >
        <div class="col-md-5">
               
            <div class="card shadow" style=" background: rgba(0, 0, 0, 0.643); color: white; font-family: Heebo;">
                <div class="card-body">
                    <h3 class="text-center">Login</h3>
                    <hr/>
                        {% if message %}
                        <div class="alert alert-danger" role="alert">
                            {{ message }}
                        </div>
                        {% endif %}
                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <input type="text" class="form-control" name="username" placeholder="User Name" required/>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" name="password" placeholder="Password" required/>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>

                        <br/>
                        <p class="text-center">
                            Don't have an account? <a href="{% url 'register' %}">Sign up here</a>
                        </p>
                    </div>
                </div>

                <br/>
                <p class="text-center">
                     <a href="{% url 'home' %}" style="color: white; background: rgba(0, 0, 0, 0.643); padding: 10px 20px; border-radius: 10px; display: inline-block;">← Back to Home</a>
                </p>
                
            </div>
        </div>
    </div>

</body>
</html>
{% endblock %}
