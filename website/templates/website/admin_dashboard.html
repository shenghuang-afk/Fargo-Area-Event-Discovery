{% extends "website/home.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Admin Dashboard</h2>
  
    {% if events %}
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for event in events %}
          <div class="col">
            <div class="card h-100 shadow-sm">
              {% include 'website/event_card.html' with event=event %}
  
              <div class="card-body">
                <p><strong>Owner:</strong> {{ event.event_owner }}</p>
  
                <a class="btn btn-danger"
                   href="{% url 'admin_delete_event' event.event_id %}"
                   onclick="return confirm('Are you sure you want to delete this event?');">
                  Delete
                </a>
                <form method="POST" action="{% url 'update_event_status' event.event_id %}">
                  {% csrf_token %}
                
                  <fieldset>
                    <label>
                      <input type="radio" name="status" value="accepted"
                        {% if event.status == 'accepted' %}checked{% endif %}>
                      Approve
                    </label>
                
                    <label>
                      <input type="radio" name="status" value="rejected"
                        {% if event.status == 'rejected' %}checked{% endif %}>
                      Reject
                    </label>
                
                    <label>
                      <input type="radio" name="status" value= "review"
                        {% if event.status == 'review' %}checked{% endif %}>
                      In review
                    </label>
                
                  </fieldset>
                
                  <button type="submit" class="btn btn-primary mt-2">Update</button>
                </form>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <p>No events found.</p>
    {% endif %}
  </div>
  
  {% endblock %}
