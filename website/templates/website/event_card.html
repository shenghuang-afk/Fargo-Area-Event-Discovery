<div class="col">
  <div class="card h-100 shadow-sm border-0">
    <div class="card-body">
      <span class="badge bg-info text-dark mb-2">{{ event.event_category }}</span>
      <h5 class="card-title fw-bold">{{ event.event_name }}</h5>
      <p class="card-text text-muted small">
        <i class="bi bi-geo-alt me-1"></i> {{ event.event_location }}
      </p>
      <!-- Link to the Detail Page you just built -->
      <a href="{% url 'event_detail' event.pk %}" class="btn btn-outline-primary btn-sm w-100">View Details</a>
    </div>
  </div>
</div>
