<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details</title>
  </head>
  <body>
    <!-- 1. Add Leaflet CSS to the <head> -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- 2. Replace your placeholder <div> with this map container -->
    <div id="event-map" style="height: 500px; width: 100%; border-radius: 8px;" class="shadow-sm"></div>

    <!-- 3. Add Leaflet JS before the </body> tag -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    // 1. Initialize the map first (center it on Fargo generally)
    var map = L.map('event-map').setView([46.8772, -96.7898], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 2. The Loop: This creates a marker for EVERY event in your fake list
    {% for event in events %}
        // We define these inside the loop so they update for each event
        var lat = Number("{{ event.latitude }}");
        var lon = Number("{{ event.longitude }}");
        var eventName = "{{ event.event_name|escapejs }}";

        // Add the marker to the map
        L.marker([lat, lon]).addTo(map)
            .bindPopup(eventName);
    {% endfor %}
</script>

    <button onclick="window.history.back()" class="btn btn-outline-secondary mt-4">Back to Events</button>
    <button onclick="window.location.href='{% url 'home' %}'" class="btn btn-outline-secondary mt-4">Home</button>
  </body>
</html>
