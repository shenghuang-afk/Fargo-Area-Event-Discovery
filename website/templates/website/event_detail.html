{% extends 'website/home.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'website/styles.css' %}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details</title>
    <!-- Essential CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Ensure Bootstrap is linked for your 'row' and 'col' classes to work -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  </head>
  <body>
    <div class="container-fluid py-5" >
      <div class="row" >
        <!-- LEFT SIDE: 50% Details -->
        <div class="col-md-6 px-lg-5" style=" background: rgba(0, 0, 0, 0.643); color: white; font-family: Heebo; border-radius: 20px; padding: 30px;">
          <span class="badge bg-info text-dark mb-3" style="border-radius: 8px; padding: 8px 12px;">{{ event.event_category|lower }}</span>

          <h1 class="display-5 fw-bold mb-3" style="color: whitesmoke;">{{ event.event_name }}</h1>
          <p style="font-size: 1.1rem; color: whitesmoke;">{{ event.event_date }} at {{ event.event_time }}</p>

          <div class="d-flex align-items-start text-muted mb-4">
            <i class="bi bi-geo-alt me-2 mt-1"></i>
            <span style="font-size: 1.1rem; color: whitesmoke;">{{ event.event_location }}</span>
          </div>

          <hr class="my-4" />

          <h4 class="fw-bold">Description</h4>
          <p style="font-size: 1.1rem;">{{ event.event_description }}</p>

          <div class="mt-5">
            <!--  <a href="{% url 'event_list' %}" class="btn btn-outline-primary px-4">Back to Events</a>
            <a href="{% url 'event_list' %}" class="btn btn-outline-secondary ms-2">Home</a>  -->
            <button class="btn btn-primary px-4" onclick="window.history.back();">Back</button>
            <a href="{% url 'user_events' %}" class="btn btn-info ms-2" style="color: white;">My events</a>
          </div>
        </div>

        <div class="col-md-6">
          <!-- ONLY one map div here -->
          <div id="event-map" style="height: 110%; width: 110%; border-radius: 20px; border: 1px solid #dee2e6;" class="shadow-sm"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    var eventLat = parseFloat("{{ event.latitude }}");
    var eventLon = parseFloat("{{ event.longitude }}");

    
    var map = L.map('event-map').setView([eventLat, eventLon], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // main marker
    L.marker([eventLat, eventLon]).addTo(map)
      .bindPopup("<b>{{ event.event_name|escapejs }}</b><br>Right here!")
      .openPopup();

      // rest of markers 
    {% for event in events %}
      var lat = parseFloat("{{  event.latitude|floatformat:"6" }}");
      var lon = parseFloat("{{  event.longitude|floatformat:"6" }}");
      var name = "{{ event.event_name|escapejs }}";

      var marker = L.marker([lat, lon]).addTo(map)
      marker.bindPopup("<b>" + name + "</b><br>Click to view details.");

      marker.on('click', function(){
        window.location.href = "{% url 'event_detail' 0 %}".replace('0', "{{ event.event_id }}");
      });

      {% endfor %}
  </script>
  </body>
{% endblock %}
