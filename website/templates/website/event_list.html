<!-- website/templates/website/event_list.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fargo Event Discovery | Browse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  </head>
  <body class="bg-light">
    <!-- Navigation Header -->
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container text-center">
        <span class="navbar-brand mx-auto fw-bold">FARGO EVENT DISCOVERY</span>
      </div>
    </nav>

    <div class="container">
      <!-- KAN-43: Filter Section -->
      <div class="row mb-5 justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <form method="GET" action="{% url 'event_list' %}" class="row g-2">
                <div class="col-9">
                  <input type="text" name="category" class="form-control" placeholder="Filter by category (e.g. Music, Sports)..." value="{{ request.GET.category }}" />
                </div>
                <div class="col-3">
                  <button type="submit" class="btn btn-primary w-100">Search</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- KAN-42: Upcoming Events Header -->
      <h2 class="mb-4 text-secondary fw-light">Upcoming Approved Events</h2>

      <!-- The Event Grid -->
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for event in events %}
          <!-- Reusing the Event List Component -->
          {% include 'website/_event_card.html' with event=event %}
        {% empty %}
          <div class="col-12 text-center py-5">
            <i class="bi bi-search text-muted display-1"></i>
            <p class="mt-3 text-muted">No events match your search.</p>
            <a href="{% url 'event_list' %}" class="btn btn-link">View All Events</a>
          </div>
        {% endfor %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
