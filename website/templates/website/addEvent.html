
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<div class="container">
    <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Add Event</h2>
        <hr/>
        <div class="form-group">
            <label for="event_name">Event Name</label>
            <input type="text" class="form-control" id="event_name" name="event_name" required>
        </div>
        <div class="form-group">
            <label for="event_date">Event Date</label>
            <input type="date" class="form-control" id="event_date" name="event_date" required>
        </div>
        <div class="form-group">
            <label for="event_location">Event Location</label>
            <input type="text" class="form-control" id="event_location" name="event_location" required>
        </div>
        <div class="form-group">
            <label for="event_category">Event Category</label>
            <select class="form-control" id="event_category" name="event_category" required>
                <option value="music">Music</option>
                <option value="sports">Sports</option>
                <option value="arts">Arts</option>
                <option value="technology">Technology</option>
                <option value="food">Food</option>
                <option value="education">Education</option>
                <option value="entertainment">Entertainment</option>
                <option value="business">Business</option>
                <option value="charity">Charity</option>
                <option value="social">Social</option>
            </select>
        </div>
        <div class="form-group">
            <label for="event_description">Event Description</label>
            <textarea class="form-control" id="event_description" name="event_description" rows="3" required></textarea>
        </div>
        <!-- Needs some actual connection to database-->
        <button type="submit" class="btn btn-primary">Add Event</button>
    </form>
</div>
{% endblock %}
